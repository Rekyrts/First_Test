<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem;
      color: #333;
    }
    header {
      border-bottom: 1px solid #eee;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #111;
      margin: 0;
    }
    .intro {
      color: #555;
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome</h1>
  </header>
  <p class="intro">
    This is a simple web page with a header, a short intro, and light styling.
    Edit the content and CSS to make it your own.
  </p>
</body>
</html>
